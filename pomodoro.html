<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="番茄钟计时器 - Pomodoro Timer">
<title>番茄钟</title>
<style>
  :root {
    --work: #e74c3c;
    --short-break: #2ecc71;
    --long-break: #3498db;
    --bg: #1a1a2e;
    --card: #16213e;
    --text: #eee;
    --muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    user-select: none;
  }

  .container {
    text-align: center;
    padding: 40px 32px;
    border-radius: 24px;
    background: var(--card);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    width: 380px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s;
  }

  .tab.active {
    background: rgba(255,255,255,0.1);
    color: var(--text);
  }

  .timer-ring {
    position: relative;
    width: 240px;
    height: 240px;
    margin: 0 auto 28px;
  }

  .ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.08);
    stroke-width: 8;
  }

  .ring-progress {
    fill: none;
    stroke: var(--work);
    stroke-width: 8;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }

  .time-display {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .time {
    font-size: 3.8rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .time-paused {
    opacity: 0.5;
  }

  .mode-label {
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 6px;
  }

  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .btn:hover {
    border-color: rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.05);
  }

  .btn:active {
    transform: scale(0.93);
  }

  .btn-start {
    width: 64px;
    height: 64px;
    font-size: 1.6rem;
  }

  .session-count {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .session-count span {
    font-weight: 700;
    color: var(--text);
  }
</style>
</head>
<body>
<div class="container">
  <h1>番茄钟</h1>

  <div class="tabs">
    <button class="tab active" data-mode="work">专注</button>
    <button class="tab" data-mode="short-break">短休</button>
    <button class="tab" data-mode="long-break">长休</button>
  </div>

  <div class="timer-ring">
    <svg width="240" height="240" viewBox="0 0 240 240">
      <circle class="ring-bg" cx="120" cy="120" r="112"/>
      <circle class="ring-progress" id="ring" cx="120" cy="120" r="112"
              stroke-dasharray="703.7" stroke-dashoffset="0"/>
    </svg>
    <div class="time-display">
      <div class="time" id="time">25:00</div>
      <div class="mode-label" id="modeLabel">专注</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="btnReset" title="重置">&#x21bb;</button>
    <button class="btn btn-start" id="btnStart" title="开始">&#x25b6;</button>
    <button class="btn" id="btnSkip" title="跳过">&#x23ed;</button>
  </div>

  <div class="session-count">
    已完成 <span id="sessionCount">0</span> 个番茄
  </div>
</div>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 112; // ~703.7

const MODES = {
  work:        { label: '专注', duration: 25 * 60, color: '#e74c3c' },
  'short-break': { label: '短休', duration: 5 * 60,  color: '#2ecc71' },
  'long-break':  { label: '长休', duration: 15 * 60, color: '#3498db' },
};

let currentMode = 'work';
let remaining = MODES.work.duration;
let totalDuration = MODES.work.duration;
let timerId = null;
let sessions = 0;

const ring = document.getElementById('ring');
const timeEl = document.getElementById('time');
const modeLabel = document.getElementById('modeLabel');
const btnStart = document.getElementById('btnStart');
const btnReset = document.getElementById('btnReset');
const btnSkip = document.getElementById('btnSkip');
const sessionCountEl = document.getElementById('sessionCount');
const tabs = document.querySelectorAll('.tab');

ring.style.stroke = MODES.work.color;

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function updateDisplay() {
  timeEl.textContent = formatTime(remaining);
  const progress = remaining / totalDuration;
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
}

function switchMode(mode) {
  currentMode = mode;
  remaining = MODES[mode].duration;
  totalDuration = MODES[mode].duration;
  ring.style.stroke = MODES[mode].color;
  modeLabel.textContent = MODES[mode].label;

  tabs.forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  updateDisplay();
}

function tick() {
  if (remaining <= 0) {
    finish();
    return;
  }
  remaining--;
  updateDisplay();
}

function start() {
  if (timerId) return;
  timerId = setInterval(tick, 1000);
  btnStart.innerHTML = '&#x23f8;';
  timeEl.classList.remove('time-paused');
}

function pause() {
  clearInterval(timerId);
  timerId = null;
  btnStart.innerHTML = '&#x25b6;';
  timeEl.classList.add('time-paused');
}

function reset() {
  pause();
  remaining = MODES[currentMode].duration;
  totalDuration = MODES[currentMode].duration;
  updateDisplay();
  timeEl.classList.remove('time-paused');
}

function finish() {
  pause();
  remaining = 0;
  updateDisplay();

  if (currentMode === 'work') {
    sessions++;
    sessionCountEl.textContent = sessions;
  }

  new Notification('番茄钟', {
    body: currentMode === 'work' ? '专注时间结束！休息一下吧。' : '休息时间结束，开始下一个番茄吧！',
    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🍅</text></svg>'
  });

  // auto-switch: work → break, break → work
  const next = currentMode === 'work'
    ? (sessions % 4 === 0 ? 'long-break' : 'short-break')
    : 'work';
  switchMode(next);
}

btnStart.addEventListener('click', () => {
  if (timerId) pause(); else start();
});

btnReset.addEventListener('click', reset);

btnSkip.addEventListener('click', () => {
  remaining = 0;
  finish();
});

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    pause();
    timeEl.classList.remove('time-paused');
    switchMode(tab.dataset.mode);
  });
});

// Request notification permission on first interaction
document.addEventListener('click', () => {
  if (Notification.permission === 'default') {
    Notification.requestPermission();
  }
}, { once: true });

updateDisplay();
</script>
</body>
</html>
